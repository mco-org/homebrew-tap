name: Update Formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.3.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-formula:
    name: Update squad formula
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula with new version and checksums
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          chmod +x .github/scripts/update-formula.sh
          .github/scripts/update-formula.sh

      - name: Commit and push updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/squad.rb
          git commit -m "Update squad to ${{ github.event.inputs.version }}"
          git push origin main
